name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12.2"
          cabal-version: "latest"

      - name: Build executable
        run: make build

      - name: Run test suite
        run: make test

      - name: Collect built binary
        run: |
          mkdir -p artifacts
          cp "$(cabal list-bin exe:tui-launcher)" artifacts/tui-launcher

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-launcher-linux
          path: artifacts/tui-launcher
