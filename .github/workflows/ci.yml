name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12.2"
          cabal-version: "latest"

      - name: Build executable
        run: make build

      - name: Run test suite
        run: make test

      - name: Collect built binary
        run: |
          mkdir -p artifacts
          cp "$(cabal list-bin exe:tui-launcher)" artifacts/tui-launcher-linux-x86_64

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-launcher-linux-x86_64
          path: artifacts/tui-launcher-linux-x86_64

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: tui-launcher-linux-x86_64
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/tui-launcher-linux-x86_64
          fail_on_unmatched_files: true
          generate_release_notes: true
